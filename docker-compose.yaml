name: roboshop
services:
   mongodb:
     build: ./mongodb
     image: sravani3093/monogodb:4.0.0
     container_name: mongodb
     volumes:
     - mongodb:/data/db
   catalogue:
      build: ./catalogue
      image: sravani3093/catalogue:4.0.0
      container_name: catalogue
      depends_on:
      - mongodb
   frontend:
      build: ./frontend
      image: sravani3093/frontend:4.0.0
      container_name: frontend
      ports:
      - "80:80"
      depends_on:
      - catalogue
      - user
      - cart
   user:
      build: ./user
      image: sravani3093/user:4.0.0
      container_name: user
      environment:
         MONGO: true
         REDIS_URL: 'redis://redis:6379'
         MONGO_URL: "mongodb://mongodb:27017/users"
      depends_on:
      - redis
      - mongodb
   redis:
       build: ./redis
       image: sravani3093/redis:4.0.0
       container_name: redis
       volumes:
       - redis:/data
   cart:
      build: ./cart
      image: sravani3093/cart:4.0.0
      container_name: cart
      environment:
         REDIS_HOST: redis
         CATALOGUE_HOST: catalogue
         CATALOGUE_PORT: 8080
      depends_on:
      - redis
      - catalogue
   mysql:
       build: ./mysql
       image: sravani3093/mysql:4.0.0
       container_name: mysql
       command: --mysql-native-password=ON --innodb-lock_wait_timeout=120
       environment:
         MYSQL_ROOT_PASSWORD: "RoboShop@1"
       volumes:
       - mysql:/var/lib/mysql
   shipping:
        build: ./shipping
        image: sravani3093/shipping:4.0.0
        container_name: shipping
        environment:
          CART_ENDPOINT: cart:8080
          DB_HOST: mysql
        depends_on:
        - mysql
        - cart
   rabbitmq:
        build: ./rabbitmq
        image: sravani3093/rabbitmq:4.0.0
        container_name: rabbitmq
        environment:
          RABBITMQ_DEFAULT_USER: roboshop
          RABBITMQ_DEFAULT_PASS: roboshop123
        volumes:
        - rabbitmq:/var/lib/rabbitmq
   payment:
        build: ./payment
        image: sravani3093/payment:4.0.0
        container_name: payment
        environment:
          CART_HOST: cart
          CART_PORT: 8080
          USER_HOST: user
          USER_PORT: 8080
          AMQP_HOST: rabbitmq
          AMQP_USER: roboshop
          AMQP_PASS: roboshop123
        depends_on:
        - cart
        - user
        - rabbitmq


networks:   
   default: 
     name: roboshop
     driver: bridge
     external: false  
volumes:
   mongodb:
   redis:
   mysql:
   rabbitmq: